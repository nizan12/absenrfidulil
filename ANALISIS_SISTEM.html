const md = `# LEMBAR ANALISIS DAN RANCANGAN KEBUTUHAN SISTEM\n## Sistem Absensi Berbasis RFID — SMAIT Ulil Albab\n\n**Versi Dokumen:** 1.0 | **Tanggal:** 17 Mei 2026 | **Penyusun:** Tim Pengembang Sistem\n\n---\n\n## 1. PENDAHULUAN\n\n### 1.1 Latar Belakang\nSistem absensi konvensional (manual/tanda tangan) memiliki kelemahan: rawan manipulasi, lambat, dan tidak real-time. Sistem Absensi RFID ini dibangun untuk mengatasi masalah tersebut dengan memanfaatkan teknologi kartu RFID yang ditempelkan pada reader ESP32, lalu data dikirim ke server dan notifikasi otomatis dikirim ke orang tua via WhatsApp.\n\n### 1.2 Tujuan Sistem\n1. Mencatat kehadiran siswa dan guru secara otomatis dan real-time\n2. Mengirim notifikasi WhatsApp otomatis kepada orang tua/wali\n3. Menyediakan dashboard monitoring dan rekap kehadiran\n4. Mengelola data master (siswa, guru, kelas, perangkat)\n5. Menyediakan landing page publik untuk pengecekan kehadiran\n\n### 1.3 Ruang Lingkup\nSistem mencakup 3 komponen utama: **Perangkat IoT** (ESP32 + RFID), **Backend API** (Laravel), dan **Frontend Web** (React/Vite).\n\n---\n\n## 2. ANALISIS PERMASALAHAN\n\n### 2.1 Identifikasi Masalah Sistem Lama\n\n| No | Masalah | Dampak |\n|----|---------|--------|\n| 1 | Absensi manual dengan tanda tangan di kertas | Rawan manipulasi, siswa bisa titip absen |\n| 2 | Tidak ada notifikasi real-time ke orang tua | Orang tua tidak tahu apakah anak sudah sampai sekolah |\n| 3 | Rekap kehadiran dilakukan manual oleh guru piket | Memakan waktu, rawan kesalahan hitung |\n| 4 | Tidak ada data digital kehadiran | Sulit membuat laporan bulanan/semester |\n| 5 | Monitoring kehadiran guru tidak terstruktur | Kepala sekolah sulit memantau kedisiplinan guru |\n\n### 2.2 Perbandingan Sistem Lama vs Sistem Baru\n\n| Aspek | Sistem Lama (Manual) | Sistem Baru (RFID) |\n|-------|---------------------|---------------------|\n| Pencatatan | Tanda tangan di kertas | Tap kartu RFID otomatis |\n| Kecepatan | ±30 detik/siswa | ±2 detik/siswa |\n| Akurasi | Rawan titip absen | Kartu unik per siswa (UID) |\n| Notifikasi | Tidak ada | WhatsApp otomatis ke orang tua |\n| Rekap | Manual hitung akhir bulan | Otomatis real-time + export Excel |\n| Monitoring | Cek fisik ke kelas | Dashboard web real-time |\n| Aksesibilitas | Hanya di sekolah | Web-based, akses dari mana saja |\n\n### 2.3 Solusi yang Diusulkan\n\n| Masalah | Solusi |\n|---------|--------|\n| Absensi manual rawan manipulasi | Kartu RFID unik per individu + validasi UID di database |\n| Orang tua tidak tahu kehadiran anak | Notifikasi WhatsApp otomatis via Fonnte API |\n| Rekap manual memakan waktu | Dashboard otomatis + export Excel |\n| Tidak ada monitoring guru | Absensi guru via RFID + notifikasi ke Kepala Sekolah |\n\n---\n\n## 3. ARSITEKTUR SISTEM\n\n### 3.1 Diagram Arsitektur\n\n\`\`\`\n┌─────────────┐     HTTP POST      ┌──────────────┐     REST API     ┌──────────────┐\n│  ESP32 +    │ ──────────────────► │   Laravel 8  │ ◄──────────────► │  React 19 +  │\n│  MFRC522    │   /api/tap          │   Backend    │                  │  Vite 7      │\n│  LCD 16x2   │                     │   (Sanctum)  │                  │  (Tailwind)  │\n│  Buzzer     │                     └──────┬───────┘                  └──────────────┘\n└─────────────┘                            │\n                                           │ API Fonnte\n                                           ▼\n                                    ┌──────────────┐\n                                    │  WhatsApp    │\n                                    │  Notifikasi  │\n                                    └──────────────┘\n\`\`\`\n\n### 3.2 Stack Teknologi\n\n| Komponen | Teknologi | Versi |\n|----------|-----------|-------|\n| Backend | Laravel (PHP) | 8.x (PHP 8.x) |\n| Frontend | React + Vite | React 19, Vite 7 |\n| Database | MySQL | 8.4.3 |\n| Auth | Laravel Sanctum | 2.11 |\n| IoT | ESP32 + MFRC522 | Arduino |\n| Notifikasi | Fonnte API (WhatsApp) | - |\n| Styling | Tailwind CSS | 4.x |\n| Charting | Chart.js | 4.5 |\n| Export | PhpSpreadsheet | 1.12 |\n| Hosting | Shared Hosting | absenulilalbab.com |\n\n---\n\n## 4. KEBUTUHAN FUNGSIONAL\n\n### 4.1 Modul Autentikasi (FR-01)\n\n| ID | Kebutuhan | Prioritas |\n|----|-----------|-----------|\n| FR-01.1 | Login dengan email dan password | Tinggi |\n| FR-01.2 | Logout dan invalidasi token | Tinggi |\n| FR-01.3 | Forgot/reset password via email | Tinggi |\n| FR-01.4 | Update profil (nama, foto, password) | Sedang |\n| FR-01.5 | Pengaturan tema (light/dark) | Rendah |\n\n### 4.2 Modul Tap/Absensi RFID (FR-02)\n\n| ID | Kebutuhan | Prioritas |\n|----|-----------|-----------|\n| FR-02.1 | Tap otomatis via ESP32 (endpoint \`/api/tap\`) | Tinggi |\n| FR-02.2 | Auto-deteksi siswa atau guru berdasarkan RFID UID | Tinggi |\n| FR-02.3 | Tap delay (default 300 detik) mencegah double-tap | Tinggi |\n| FR-02.4 | Otomatis tentukan tipe tap (IN/OUT) berdasarkan tap terakhir | Tinggi |\n| FR-02.5 | Manual tap dari dashboard (authenticated) | Sedang |\n| FR-02.6 | Public manual tap via USB RFID reader (landing page) | Sedang |\n| FR-02.7 | Validasi API key untuk keamanan endpoint ESP32 | Tinggi |\n| FR-02.8 | Dukungan siswa boarding dengan pesan notifikasi berbeda | Sedang |\n\n### 4.3 Modul Notifikasi WhatsApp (FR-03)\n\n| ID | Kebutuhan | Prioritas |\n|----|-----------|-----------|\n| FR-03.1 | Kirim notifikasi WA otomatis ke orang tua saat siswa tap | Tinggi |\n| FR-03.2 | Kirim notifikasi WA ke kepala sekolah saat guru tap | Sedang |\n| FR-03.3 | Log semua notifikasi (status: pending/sent/failed) | Tinggi |\n| FR-03.4 | Normalisasi nomor telepon (08xx → 628xx) | Tinggi |\n| FR-03.5 | Toggle penerimaan notifikasi per orang tua | Sedang |\n\n### 4.4 Modul Dashboard (FR-04)\n\n| ID | Kebutuhan | Prioritas |\n|----|-----------|-----------|\n| FR-04.1 | Statistik total siswa, guru, kelas, dan device | Tinggi |\n| FR-04.2 | Kehadiran hari ini (siswa masuk/keluar, guru hadir) | Tinggi |\n| FR-04.3 | Grafik kehadiran mingguan dan bulanan | Sedang |\n| FR-04.4 | Log aktivitas terbaru (10 tap terakhir) | Sedang |\n\n### 4.5 Modul Data Master (FR-05)\n\n| ID | Kebutuhan | Prioritas |\n|----|-----------|-----------|\n| FR-05.1 | CRUD Siswa (NIS, RFID UID, nama, foto, kelas, kategori) | Tinggi |\n| FR-05.2 | CRUD Guru (NIP, RFID UID, nama, telepon, foto) | Tinggi |\n| FR-05.3 | CRUD Kelas (nama, tingkat, jurusan) | Tinggi |\n| FR-05.4 | CRUD Kategori siswa (Reguler, Beasiswa, Full Day, Boarding) | Sedang |\n| FR-05.5 | CRUD Orang Tua (nama, telepon, hubungan, toggle notifikasi) | Tinggi |\n| FR-05.6 | CRUD User/Admin (nama, email, role, foto) | Tinggi |\n| FR-05.7 | CRUD Perangkat ESP32 (kode, nama, lokasi, tipe, delay) | Tinggi |\n| FR-05.8 | CRUD Lokasi (nama, deskripsi) | Sedang |\n| FR-05.9 | Import data siswa/guru/user via Excel template | Sedang |\n| FR-05.10 | Check RFID UID duplikat saat input siswa | Sedang |\n\n### 4.6 Modul Rekap & Laporan (FR-06)\n\n| ID | Kebutuhan | Prioritas |\n|----|-----------|-----------|\n| FR-06.1 | Rekap kehadiran siswa (filter tanggal, kelas) | Tinggi |\n| FR-06.2 | Rekap kehadiran guru | Tinggi |\n| FR-06.3 | Export laporan ke Excel | Tinggi |\n| FR-06.4 | Preview laporan sebelum export | Sedang |\n| FR-06.5 | Live monitor kehadiran real-time | Sedang |\n\n### 4.7 Modul Landing Page Publik (FR-07)\n\n| ID | Kebutuhan | Prioritas |\n|----|-----------|-----------|\n| FR-07.1 | Tampilan publik tanpa login | Tinggi |\n| FR-07.2 | Pencarian siswa (by nama/nama ortu) | Sedang |\n| FR-07.3 | Lihat log kehadiran per siswa | Sedang |\n| FR-07.4 | Live feed kehadiran hari ini | Sedang |\n| FR-07.5 | Tampilkan logo dan nama institusi | Rendah |\n\n### 4.8 Modul Pengaturan (FR-08)\n\n| ID | Kebutuhan | Prioritas |\n|----|-----------|-----------|\n| FR-08.1 | Pengaturan nama dan logo institusi | Sedang |\n| FR-08.2 | Pengaturan API token Fonnte (WhatsApp) | Tinggi |\n| FR-08.3 | Pengaturan API key ESP32 | Tinggi |\n| FR-08.4 | Pengaturan nomor HP kepala sekolah | Sedang |\n| FR-08.5 | Pengaturan default tap delay | Sedang |\n\n---\n\n## 5. KEBUTUHAN NON-FUNGSIONAL\n\n| ID | Kebutuhan | Deskripsi |\n|----|-----------|-----------|\n| NFR-01 | **Keamanan** | Autentikasi token (Sanctum), API key untuk ESP32, RBAC |\n| NFR-02 | **Performa** | Tap delay mencegah spam, indexed query pada attendance_logs |\n| NFR-03 | **Responsif** | UI responsive (mobile, tablet, desktop) dengan Tailwind |\n| NFR-04 | **Ketersediaan** | Hosted di shared hosting, toleran terhadap kegagalan WA |\n| NFR-05 | **Skalabilitas** | Multi-device ESP32, multi-lokasi |\n| NFR-06 | **UX** | Dark/light mode, glassmorphism UI, toast notification |\n| NFR-07 | **Reliabilitas** | Logging notifikasi, error tracking |\n| NFR-08 | **Maintainability** | Kode terstruktur (MVC + Service Layer) |\n\n---\n\n## 6. HIERARKI PENGGUNA (ROLE-BASED ACCESS)\n\n| Role | Level | Akses |\n|------|-------|-------|\n| \`super_admin\` | Tertinggi | Semua fitur manajemen, settings, users |\n| \`kepala_sekolah\` | Tinggi | Dashboard, rekap, laporan, monitoring |\n| \`staff_admin\` | Menengah | Data master, rekap, laporan |\n| \`guru_piket\` | Dasar | Dashboard, live monitor, manual tap |\n| \`operator\` | Dasar | Dashboard, monitoring terbatas |\n\n---\n\n## 7. USE CASE DIAGRAM\n\n### 7.1 Diagram\n\n\`\`\`mermaid\ngraph TB\n    subgraph Aktor\n        S[Siswa/Guru]\n        OT[Orang Tua]\n        GP[Guru Piket]\n        OP[Operator]\n        SA[Super Admin]\n        KS[Kepala Sekolah]\n    end\n    subgraph "Sistem Absensi RFID"\n        UC1[Tap Kartu RFID]\n        UC2[Lihat Landing Page]\n        UC3[Cari Kehadiran Siswa]\n        UC4[Terima Notifikasi WA]\n        UC5[Login]\n        UC6[Lihat Dashboard]\n        UC7[Manual Tap]\n        UC8[Live Monitor]\n        UC9[Kelola Data Siswa]\n        UC10[Kelola Data Guru]\n        UC11[Kelola Kelas dan Kategori]\n        UC12[Kelola Orang Tua]\n        UC13[Kelola Perangkat dan Lokasi]\n        UC14[Rekap dan Export Laporan]\n        UC15[Kelola User Admin]\n        UC16[Pengaturan Sistem]\n    end\n    S --> UC1\n    OT --> UC2\n    OT --> UC3\n    OT --> UC4\n    GP --> UC5\n    GP --> UC6\n    GP --> UC7\n    GP --> UC8\n    OP --> UC6\n    SA --> UC9\n    SA --> UC10\n    SA --> UC11\n    SA --> UC12\n    SA --> UC13\n    SA --> UC14\n    SA --> UC15\n    SA --> UC16\n    KS --> UC6\n    KS --> UC14\n\`\`\`\n\n### 7.2 Deskripsi Use Case\n\n| ID | Use Case | Aktor | Deskripsi |\n|----|----------|-------|-----------|\n| UC-01 | Tap Kartu RFID | Siswa, Guru | Menempelkan kartu RFID pada reader untuk mencatat kehadiran |\n| UC-02 | Lihat Landing Page | Orang Tua | Melihat halaman publik tanpa login |\n| UC-03 | Cari Kehadiran Siswa | Orang Tua | Mencari dan melihat log kehadiran anak |\n| UC-04 | Terima Notifikasi WA | Orang Tua, Kepsek | Menerima notifikasi otomatis via WhatsApp |\n| UC-05 | Login | Semua Admin | Masuk ke sistem menggunakan email dan password |\n| UC-06 | Lihat Dashboard | GP, OP, SA, KS | Melihat statistik kehadiran hari ini |\n| UC-07 | Manual Tap | Guru Piket | Input absensi manual dari dashboard |\n| UC-08 | Live Monitor | GP, OP | Memantau tap kehadiran secara real-time |\n| UC-09 | Kelola Data Siswa | Super Admin | CRUD + import data siswa |\n| UC-10 | Kelola Data Guru | Super Admin | CRUD + import data guru |\n| UC-11 | Kelola Kelas & Kategori | Super Admin | CRUD kelas dan kategori siswa |\n| UC-12 | Kelola Orang Tua | Super Admin | CRUD data orang tua/wali |\n| UC-13 | Kelola Perangkat | Super Admin | CRUD device ESP32 dan lokasi |\n| UC-14 | Rekap & Export | SA, KS | Lihat rekap dan export ke Excel |\n| UC-15 | Kelola User Admin | Super Admin | CRUD akun admin dan assign role |\n| UC-16 | Pengaturan Sistem | Super Admin | Konfigurasi institusi, API, dll |\n\n---\n\n## 8. RANCANGAN DATABASE (ERD)\n\n### 8.1 Entity Relationship Diagram\n\n\`\`\`mermaid\nerDiagram\n    users {\n        bigint id PK\n        varchar name\n        varchar email UK\n        timestamp email_verified_at\n        varchar password\n        varchar photo\n        enum role "super_admin | kepala_sekolah | staff_admin | guru_piket | operator"\n        varchar remember_token\n        timestamp created_at\n        timestamp updated_at\n    }\n    students {\n        bigint id PK\n        varchar rfid_uid UK\n        varchar nis UK\n        varchar name\n        varchar photo\n        bigint class_id FK\n        bigint category_id FK\n        boolean is_active\n        timestamp created_at\n        timestamp updated_at\n    }\n    teachers {\n        bigint id PK\n        varchar rfid_uid UK\n        varchar nip UK\n        varchar name\n        varchar phone\n        varchar photo\n        boolean is_active\n        timestamp created_at\n        timestamp updated_at\n    }\n    classes {\n        bigint id PK\n        varchar name\n        varchar grade\n        varchar major\n        timestamp created_at\n        timestamp updated_at\n    }\n    categories {\n        bigint id PK\n        varchar name\n        text description\n        timestamp created_at\n        timestamp updated_at\n    }\n    parents {\n        bigint id PK\n        bigint student_id FK\n        varchar name\n        varchar phone\n        varchar photo\n        enum relationship "ayah | ibu | wali"\n        boolean receive_notification\n        timestamp created_at\n        timestamp updated_at\n    }\n    attendance_logs {\n        bigint id PK\n        bigint student_id FK\n        bigint esp_device_id FK\n        bigint recorded_by FK\n        enum tap_type "in | out"\n        timestamp tapped_at\n        boolean wa_sent\n        timestamp created_at\n        timestamp updated_at\n    }\n    teacher_attendance_logs {\n        bigint id PK\n        bigint teacher_id FK\n        bigint esp_device_id FK\n        enum tap_type "in | out"\n        timestamp tapped_at\n        boolean wa_sent\n        timestamp created_at\n        timestamp updated_at\n    }\n    esp_devices {\n        bigint id PK\n        varchar device_code UK\n        varchar name\n        bigint location_id FK\n        enum type "gate_in | gate_out | classroom"\n        boolean is_active\n        int tap_delay_seconds\n        timestamp created_at\n        timestamp updated_at\n    }\n    locations {\n        bigint id PK\n        varchar name\n        text description\n        timestamp created_at\n        timestamp updated_at\n    }\n    notification_logs {\n        bigint id PK\n        varchar phone\n        text message\n        enum type "student | teacher"\n        enum status "pending | sent | failed"\n        text response\n        timestamp created_at\n        timestamp updated_at\n    }\n    app_settings {\n        bigint id PK\n        varchar key UK\n        text value\n        timestamp created_at\n        timestamp updated_at\n    }\n    user_settings {\n        bigint id PK\n        bigint user_id FK\n        enum theme "light | dark"\n        timestamp created_at\n        timestamp updated_at\n    }\n    personal_access_tokens {\n        bigint id PK\n        varchar tokenable_type\n        bigint tokenable_id\n        varchar name\n        varchar token UK\n        text abilities\n        timestamp last_used_at\n        timestamp created_at\n        timestamp updated_at\n    }\n    password_resets {\n        varchar email\n        varchar token\n        timestamp created_at\n    }\n\n    students ||--o{ attendance_logs : "has"\n    students ||--o{ parents : "has"\n    students }o--|| classes : "belongs to"\n    students }o--o| categories : "belongs to"\n    teachers ||--o{ teacher_attendance_logs : "has"\n    esp_devices ||--o{ attendance_logs : "records"\n    esp_devices ||--o{ teacher_attendance_logs : "records"\n    esp_devices }o--o| locations : "at"\n    users ||--o| user_settings : "has"\n    users ||--o{ attendance_logs : "recorded_by"\n    users ||--o{ personal_access_tokens : "has"\n\`\`\`\n\n### 8.2 Relasi Antar Tabel\n\n| Relasi | Tipe | Constraint | Keterangan |\n|--------|------|------------|------------|\n| students → classes | Many-to-One | ON DELETE CASCADE | Siswa terdaftar di satu kelas |\n| students → categories | Many-to-One (nullable) | ON DELETE SET NULL | Kategori (Reguler/Boarding) |\n| students → parents | One-to-Many | ON DELETE CASCADE | Satu siswa punya banyak orang tua |\n| students → attendance_logs | One-to-Many | ON DELETE CASCADE | Log kehadiran siswa |\n| teachers → teacher_attendance_logs | One-to-Many | ON DELETE CASCADE | Log kehadiran guru |\n| esp_devices → locations | Many-to-One (nullable) | ON DELETE SET NULL | Device ditempatkan di lokasi |\n| esp_devices → attendance_logs | One-to-Many | ON DELETE SET NULL | Device mencatat tap |\n| esp_devices → teacher_attendance_logs | One-to-Many | ON DELETE SET NULL | Device mencatat tap guru |\n| users → user_settings | One-to-One | ON DELETE CASCADE | Preferensi tema user |\n| users → attendance_logs | One-to-Many | ON DELETE SET NULL | Manual tap recorded_by |\n| users → personal_access_tokens | One-to-Many | - | Token auth Sanctum |\n\n---\n\n## 9. RANCANGAN API ENDPOINTS\n\n### 9.1 Public Endpoints (Tanpa Auth)\n\n| Method | Endpoint | Fungsi |\n|--------|----------|--------|\n| POST | \`/api/tap\` | Tap universal dari ESP32 (auto-detect siswa/guru) |\n| POST | \`/api/tap/student\` | Tap khusus siswa |\n| POST | \`/api/tap/teacher\` | Tap khusus guru |\n| POST | \`/api/public/tap/manual\` | Tap manual via USB reader |\n| GET | \`/api/public/settings\` | Settings publik (logo, nama) |\n| GET | \`/api/public/search?q=\` | Cari siswa by nama |\n| GET | \`/api/public/student/{id}\` | Log kehadiran siswa |\n| GET | \`/api/public/live\` | Live feed hari ini |\n| POST | \`/api/login\` | Login |\n| POST | \`/api/forgot-password\` | Lupa password |\n| POST | \`/api/reset-password\` | Reset password |\n\n### 9.2 Protected Endpoints (Auth: Sanctum)\n\n| Method | Endpoint | Fungsi |\n|--------|----------|--------|\n| GET | \`/api/dashboard\` | Statistik dashboard |\n| GET/POST | \`/api/students\` | CRUD siswa |\n| GET/POST | \`/api/teachers\` | CRUD guru |\n| GET/POST | \`/api/classes\` | CRUD kelas |\n| GET/POST | \`/api/categories\` | CRUD kategori |\n| GET/POST | \`/api/parents\` | CRUD orang tua |\n| GET/POST | \`/api/users\` | CRUD user admin |\n| GET/POST | \`/api/devices\` | CRUD perangkat ESP32 |\n| GET/POST | \`/api/locations\` | CRUD lokasi |\n| GET | \`/api/attendance/students\` | Log kehadiran siswa |\n| GET | \`/api/attendance/teachers\` | Log kehadiran guru |\n| GET | \`/api/attendance/live\` | Live monitor |\n| GET/POST | \`/api/settings\` | Pengaturan aplikasi |\n| GET | \`/api/notifications\` | Log notifikasi |\n| GET | \`/api/reports/*/export\` | Export laporan Excel |\n| POST | \`/api/tap/manual\` | Manual tap (auth) |\n\n---\n\n## 10. RANCANGAN PERANGKAT KERAS (IoT)\n\n### 10.1 Komponen Hardware\n\n| Komponen | Spesifikasi | Fungsi |\n|----------|-------------|--------|\n| ESP32 DevKit | Dual-core, WiFi+BLE | Mikrokontroler utama |\n| MFRC522 | 13.56 MHz, SPI | Pembaca kartu RFID |\n| LCD I2C 16x2 | Alamat 0x27, I2C | Tampilan status |\n| Buzzer | Active buzzer, GPIO 4 | Feedback audio |\n| Kartu RFID | MIFARE Classic 1K | Kartu identitas siswa/guru |\n\n### 10.2 Wiring\n\n| MFRC522 → ESP32 | LCD I2C → ESP32 | Buzzer → ESP32 |\n|-----------------|-----------------|----------------|\n| SDA → GPIO 5 | SDA → GPIO 21 | Signal → GPIO 4 |\n| SCK → GPIO 18 | SCL → GPIO 22 | GND → GND |\n| MOSI → GPIO 23 | VCC → 5V | |\n| MISO → GPIO 19 | GND → GND | |\n| RST → GPIO 27 | | |\n\n### 10.3 Mode Operasi\n- **Mode 1 (UID Reader):** Hanya baca dan tampilkan UID kartu (maintenance)\n- **Mode 2 (Presensi):** Mode operasional, kirim data ke server\n\n---\n\n## 11. ACTIVITY DIAGRAM\n\n### 11.1 Alur Proses Tap Kehadiran\n\n\`\`\`mermaid\nflowchart TD\n    A([Mulai]) --> B[Siswa/Guru tempel kartu RFID]\n    B --> C[ESP32 membaca UID kartu]\n    C --> D{RFID terbaca?}\n    D -- Tidak --> E[Beep error]\n    E --> B\n    D -- Ya --> F[Kirim POST /api/tap ke server]\n    F --> G{API Key valid?}\n    G -- Tidak --> H[Response 401]\n    H --> B\n    G -- Ya --> J{UID terdaftar?}\n    J -- Tidak --> K[Response 404: KARTU TIDAK TERDAFTAR]\n    K --> B\n    J -- Ya --> M{Delay terpenuhi?}\n    M -- Tidak --> N[Response 429: TUNGGU DULU]\n    N --> B\n    M -- Ya --> P[Tentukan tipe: IN/OUT]\n    P --> Q[Simpan ke attendance_logs]\n    Q --> R[Kirim WA via Fonnte]\n    R --> S[Log notifikasi + Broadcast event]\n    S --> V[LCD: SELAMAT DATANG / SAMPAI JUMPA]\n    V --> B\n\`\`\`\n\n### 11.2 Alur Login Admin\n\n\`\`\`mermaid\nflowchart TD\n    A([Mulai]) --> B[Buka /login]\n    B --> C[Input email dan password]\n    C --> D[POST /api/login]\n    D --> E{Kredensial valid?}\n    E -- Tidak --> F[Tampilkan error]\n    F --> C\n    E -- Ya --> G[Generate Sanctum token]\n    G --> H[Simpan token di localStorage]\n    H --> I[Redirect ke /dashboard]\n    I --> J([Selesai])\n\`\`\`\n\n### 11.3 Alur Export Rekap\n\n\`\`\`mermaid\nflowchart TD\n    A([Mulai]) --> B[Buka halaman Rekap]\n    B --> C[Pilih filter tanggal dan kelas]\n    C --> D[Tampilkan tabel rekap]\n    D --> E{Export?}\n    E -- Tidak --> F([Selesai])\n    E -- Ya --> G[Server generate Excel]\n    G --> H[Download file .xlsx]\n    H --> F\n\`\`\`\n\n### 11.4 Alur CRUD Data Siswa\n\n\`\`\`mermaid\nflowchart TD\n    A([Mulai]) --> B[Admin buka halaman Siswa]\n    B --> C[Sistem tampilkan tabel siswa]\n    C --> D{Aksi?}\n    D -- Tambah --> E[Isi form: NIS, RFID UID, Nama, Kelas, Foto]\n    E --> F{RFID UID unik?}\n    F -- Tidak --> G[Tampilkan error: UID sudah terdaftar]\n    G --> E\n    F -- Ya --> H[Simpan data siswa ke database]\n    H --> I[Upload foto ke storage]\n    I --> C\n    D -- Edit --> J[Tampilkan form dengan data existing]\n    J --> K[Admin ubah data]\n    K --> L[Update data di database]\n    L --> C\n    D -- Hapus --> M{Konfirmasi hapus?}\n    M -- Tidak --> C\n    M -- Ya --> N[Hapus siswa + cascade orang tua + log]\n    N --> C\n\`\`\`\n\n### 11.5 Alur Pengiriman Notifikasi WhatsApp\n\n\`\`\`mermaid\nflowchart TD\n    A([Tap Berhasil Disimpan]) --> B[Ambil data orang tua siswa]\n    B --> C{Ada orang tua dengan notifikasi aktif?}\n    C -- Tidak --> D[Selesai tanpa kirim WA]\n    C -- Ya --> E[Ambil token Fonnte dari app_settings]\n    E --> F{Token tersedia?}\n    F -- Tidak --> G[Log: failed - token not configured]\n    F -- Ya --> H[Susun pesan WA: nama, status, waktu, lokasi]\n    H --> I{Siswa boarding?}\n    I -- Ya --> J[Format pesan khusus boarding]\n    I -- Tidak --> K[Format pesan reguler]\n    J --> L[Kirim POST ke api.fonnte.com/send]\n    K --> L\n    L --> M{Berhasil?}\n    M -- Ya --> N[Log notifikasi: status sent]\n    M -- Tidak --> O[Log notifikasi: status failed]\n    N --> P[Update attendance_log: wa_sent = true]\n    O --> Q([Selesai])\n    P --> Q\n\`\`\`\n\n### 11.6 Alur Manual Tap dari Dashboard\n\n\`\`\`mermaid\nflowchart TD\n    A([Mulai]) --> B[Guru Piket buka Dashboard]\n    B --> C[Input RFID UID + pilih device]\n    C --> D[POST /api/tap/manual]\n    D --> E{Token valid?}\n    E -- Tidak --> F[Error 401: Unauthorized]\n    E -- Ya --> G{Device aktif?}\n    G -- Tidak --> H[Error: Device tidak aktif]\n    G -- Ya --> I[Coba cari sebagai siswa]\n    I --> J{Siswa ditemukan?}\n    J -- Ya --> K[Proses tap siswa]\n    J -- Tidak --> L[Coba cari sebagai guru]\n    L --> M{Guru ditemukan?}\n    M -- Ya --> N[Proses tap guru]\n    M -- Tidak --> O[Error 404: Kartu tidak terdaftar]\n    K --> P[Simpan log + kirim WA]\n    N --> P\n    P --> Q[Tampilkan hasil di dashboard]\n    Q --> R([Selesai])\n\`\`\`\n\n### 11.7 Alur Pencarian di Landing Page\n\n\`\`\`mermaid\nflowchart TD\n    A([Mulai]) --> B[Orang tua buka landing page]\n    B --> C[Ketik nama siswa di search bar]\n    C --> D{Panjang >= 2 karakter?}\n    D -- Tidak --> E[Tidak ada pencarian]\n    D -- Ya --> F[GET /api/public/search?q=nama]\n    F --> G[Tampilkan daftar hasil]\n    G --> H[Klik salah satu siswa]\n    H --> I[GET /api/public/student/id]\n    I --> J[Tampilkan: status hari ini, log kehadiran, statistik bulanan]\n    J --> K([Selesai])\n\`\`\`\n\n### 11.8 Alur Import Data Excel\n\n\`\`\`mermaid\nflowchart TD\n    A([Mulai]) --> B[Admin download template Excel]\n    B --> C[Isi data siswa sesuai template]\n    C --> D[Upload file .xlsx]\n    D --> E{Format file valid?}\n    E -- Tidak --> F[Error: Format tidak sesuai]\n    F --> C\n    E -- Ya --> G[Baca baris per baris]\n    G --> H{Data valid per baris?}\n    H -- Tidak --> I[Skip baris + catat error]\n    H -- Ya --> J[Insert ke database]\n    I --> K{Masih ada baris?}\n    J --> K\n    K -- Ya --> G\n    K -- Tidak --> L[Tampilkan hasil: berhasil X, gagal Y]\n    L --> M([Selesai])\n\`\`\`\n\n---\n\n## 12. SEQUENCE DIAGRAM\n\n### 12.1 Proses Tap Kartu RFID\n\n\`\`\`mermaid\nsequenceDiagram\n    participant K as Kartu RFID\n    participant E as ESP32\n    participant S as Server Laravel\n    participant DB as MySQL\n    participant F as Fonnte API\n    participant WA as WhatsApp Ortu\n\n    K->>E: Tempel kartu\n    E->>E: Baca UID via MFRC522\n    E->>S: POST /api/tap {device_code, rfid_uid, api_key}\n    S->>S: Validasi API key\n    S->>DB: Cari device & siswa by UID\n    DB-->>S: Data siswa\n    S->>S: Cek delay & tentukan IN/OUT\n    S->>DB: INSERT attendance_logs\n    S->>F: Kirim WA via Fonnte\n    F-->>S: Status sent\n    S->>DB: Log notifikasi\n    S-->>E: 200 {nama, pesan, tap_type}\n    E->>E: LCD + Beep sukses\n    F->>WA: Pesan WhatsApp terkirim\n\`\`\`\n\n### 12.2 Proses Login & Dashboard\n\n\`\`\`mermaid\nsequenceDiagram\n    participant U as Browser\n    participant FE as React Frontend\n    participant BE as Laravel Backend\n    participant DB as MySQL\n\n    U->>FE: Buka /login\n    U->>FE: Submit email + password\n    FE->>BE: POST /api/login\n    BE->>DB: Cari user by email\n    BE->>BE: Verifikasi password\n    BE->>DB: Create Sanctum token\n    BE-->>FE: 200 {user, token}\n    FE->>FE: Simpan token localStorage\n    FE->>BE: GET /api/dashboard (Bearer token)\n    BE->>DB: Query statistik\n    BE-->>FE: 200 {statistics}\n    FE-->>U: Render dashboard\n\`\`\`\n\n---\n\n### 12.3 Proses CRUD Data Siswa\n\n\`\`\`mermaid\nsequenceDiagram\n    participant A as Admin (Browser)\n    participant FE as React Frontend\n    participant BE as Laravel Backend\n    participant DB as MySQL\n    participant FS as File Storage\n\n    A->>FE: Buka halaman /students\n    FE->>BE: GET /api/students (Bearer token)\n    BE->>DB: SELECT students + class + category\n    DB-->>BE: Data siswa\n    BE-->>FE: 200 {data: students[]}\n    FE-->>A: Render tabel siswa\n\n    A->>FE: Klik Tambah, isi form + upload foto\n    FE->>BE: POST /api/students (multipart/form-data)\n    BE->>BE: Validasi (NIS unik, RFID unik)\n    BE->>DB: CHECK rfid_uid EXISTS?\n    DB-->>BE: Tidak ada duplikat\n    BE->>FS: Simpan foto ke storage/photos/students\n    BE->>DB: INSERT INTO students\n    DB-->>BE: OK\n    BE-->>FE: 201 {success, data: student}\n    FE-->>A: Toast sukses + refresh tabel\n\`\`\`\n\n### 12.4 Proses Manual Tap dari Dashboard\n\n\`\`\`mermaid\nsequenceDiagram\n    participant GP as Guru Piket\n    participant FE as React Frontend\n    participant BE as Laravel Backend\n    participant TS as TapService\n    participant WA as Fonnte API\n\n    GP->>FE: Input RFID UID + pilih device\n    FE->>BE: POST /api/tap/manual {rfid_uid, device_id}\n    BE->>BE: Validasi Sanctum token\n    BE->>TS: processStudentTap(device_code, rfid_uid)\n    TS->>TS: Cari siswa, cek delay, tentukan IN/OUT\n    TS->>TS: Simpan attendance_log\n    TS->>WA: Kirim notifikasi WA ke ortu\n    WA-->>TS: Status sent\n    TS-->>BE: Result {success, nama, tap_type}\n    BE-->>FE: 200 {success, student, tap_type}\n    FE-->>GP: Tampilkan hasil tap\n\`\`\`\n\n### 12.5 Proses Pencarian di Landing Page\n\n\`\`\`mermaid\nsequenceDiagram\n    participant OT as Orang Tua\n    participant FE as Landing Page\n    participant BE as Laravel Backend\n    participant DB as MySQL\n\n    OT->>FE: Buka absenulilalbab.com\n    FE->>BE: GET /api/public/settings\n    BE-->>FE: {institution_name, logo}\n    FE-->>OT: Tampilkan landing page\n\n    OT->>FE: Ketik nama anak di search bar\n    FE->>BE: GET /api/public/search?q=Ahmad\n    BE->>DB: SELECT students WHERE name LIKE '%ahmad%'\n    DB-->>BE: Hasil pencarian\n    BE-->>FE: 200 {data: students[]}\n    FE-->>OT: Tampilkan daftar siswa\n\n    OT->>FE: Klik nama siswa\n    FE->>BE: GET /api/public/student/34\n    BE->>DB: SELECT attendance_logs + today status + monthly stats\n    DB-->>BE: Data lengkap\n    BE-->>FE: 200 {student, logs, today_status, monthly_stats}\n    FE-->>OT: Tampilkan detail kehadiran anak\n\`\`\`\n\n### 12.6 Proses Export Rekap ke Excel\n\n\`\`\`mermaid\nsequenceDiagram\n    participant A as Admin\n    participant FE as React Frontend\n    participant BE as Laravel Backend\n    participant DB as MySQL\n    participant XL as PhpSpreadsheet\n\n    A->>FE: Buka /recap, pilih filter tanggal & kelas\n    FE->>BE: GET /api/attendance/students?date_from=...&class_id=...\n    BE->>DB: SELECT attendance_logs JOIN students JOIN classes\n    DB-->>BE: Data kehadiran\n    BE-->>FE: 200 {data: logs[]}\n    FE-->>A: Tampilkan tabel rekap\n\n    A->>FE: Klik tombol Export Excel\n    FE->>BE: GET /api/reports/students/export?date_from=...&class_id=...\n    BE->>DB: Query data kehadiran\n    DB-->>BE: Data lengkap\n    BE->>XL: Generate file .xlsx (AttendanceExport)\n    XL-->>BE: File Excel siap\n    BE-->>FE: Response download .xlsx\n    FE-->>A: Browser download file Excel\n\`\`\`\n\n---\n\n## 13. CLASS DIAGRAM (Backend)\n\n\`\`\`mermaid\nclassDiagram\n    class User {\n        +bigint id\n        +string name\n        +string email\n        +string password\n        +string photo\n        +enum role\n        +setting() UserSetting\n        +isSuperAdmin() bool\n        +isKepalaSekolah() bool\n    }\n\n    class Student {\n        +bigint id\n        +string rfid_uid\n        +string nis\n        +string name\n        +string photo\n        +bigint class_id\n        +bigint category_id\n        +bool is_active\n        +class() Classes\n        +category() Category\n        +parents() StudentParent[]\n        +attendanceLogs() AttendanceLog[]\n        +getLastTapAttribute()\n    }\n\n    class Teacher {\n        +bigint id\n        +string rfid_uid\n        +string nip\n        +string name\n        +string phone\n        +string photo\n        +bool is_active\n    }\n\n    class Classes {\n        +bigint id\n        +string name\n        +string grade\n        +string major\n    }\n\n    class Category {\n        +bigint id\n        +string name\n        +string description\n    }\n\n    class StudentParent {\n        +bigint id\n        +bigint student_id\n        +string name\n        +string phone\n        +string photo\n        +enum relationship\n        +bool receive_notification\n        +student() Student\n    }\n\n    class AttendanceLog {\n        +bigint id\n        +bigint student_id\n        +bigint esp_device_id\n        +bigint recorded_by\n        +enum tap_type\n        +timestamp tapped_at\n        +bool wa_sent\n        +student() Student\n        +espDevice() EspDevice\n    }\n\n    class EspDevice {\n        +bigint id\n        +string device_code\n        +string name\n        +bigint location_id\n        +enum type\n        +bool is_active\n        +int tap_delay_seconds\n        +location() Location\n        +attendanceLogs() AttendanceLog[]\n    }\n\n    class Location {\n        +bigint id\n        +string name\n        +string description\n    }\n\n    class NotificationLog {\n        +bigint id\n        +string phone\n        +string message\n        +enum type\n        +enum status\n        +string response\n    }\n\n    class TeacherAttendanceLog {\n        +bigint id\n        +bigint teacher_id\n        +bigint esp_device_id\n        +enum tap_type\n        +timestamp tapped_at\n        +bool wa_sent\n        +teacher() Teacher\n        +espDevice() EspDevice\n    }\n\n    class AppSetting {\n        +bigint id\n        +string key\n        +string value\n        +get(key, default)\$ string\n        +set(key, value)\$\n    }\n\n    class UserSetting {\n        +bigint id\n        +bigint user_id\n        +enum theme\n        +user() User\n    }\n\n    class TapService {\n        -FonnteService fonnteService\n        +processStudentTap(deviceCode, rfidUid, forceTapType)\n        +processTeacherTap(deviceCode, rfidUid)\n    }\n\n    class FonnteService {\n        -string apiUrl\n        +sendWhatsApp(phone, message, type)\n        +sendStudentNotification(student, tapType, location, tappedAt)\n        +sendTeacherNotification(teacher, tapType, location, tappedAt)\n        -normalizePhone(phone)\n    }\n\n    class DashboardService {\n        +getStatistics()\n        +getTodayAttendance()\n        +getWeeklyAttendance()\n        +getMonthlyAttendance()\n        +getRecentLogs(limit)\n    }\n\n    Student "1" --> "*" AttendanceLog\n    Student "1" --> "*" StudentParent\n    Student "*" --> "1" Classes\n    Student "*" --> "0..1" Category\n    Teacher "1" --> "*" TeacherAttendanceLog\n    EspDevice "1" --> "*" AttendanceLog\n    EspDevice "*" --> "0..1" Location\n    User "1" --> "*" AttendanceLog : recorded_by\n    TapService --> FonnteService\n    TapService --> Student\n    TapService --> Teacher\n    TapService --> AttendanceLog\n    TapService --> TeacherAttendanceLog\n    FonnteService --> NotificationLog\n    User "1" --> "1" UserSetting\n    EspDevice "1" --> "*" TeacherAttendanceLog\n    TapService ..> AppSetting : reads config\n\`\`\`\n\n---\n\n## 14. RANCANGAN ANTARMUKA (UI)\n\n### 14.1 Halaman Publik\n\n| Halaman | Elemen Utama |\n|---------|-------------|\n| **Landing Page** | Logo, nama institusi, search bar, live feed, mode tap USB |\n| **Login** | Form email, password, link forgot password (glassmorphism) |\n| **Forgot Password** | Form email, tombol kirim reset link |\n| **Reset Password** | Form password baru + konfirmasi |\n\n### 14.2 Halaman Dashboard (Protected)\n\n| Halaman | Elemen Utama |\n|---------|-------------|\n| **Dashboard** | 4 kartu statistik, grafik mingguan (Bar), grafik bulanan (Line), tabel log terbaru |\n| **Live Monitor** | Feed real-time, statistik IN/OUT, auto-refresh |\n| **Rekap** | Filter tanggal/kelas, tabel kehadiran, tombol Export Excel |\n\n### 14.3 Halaman Data Master\n\n| Halaman | Elemen Utama |\n|---------|-------------|\n| **Siswa** | Tabel + search + pagination, modal CRUD, upload foto, import Excel, check RFID |\n| **Guru** | Tabel + search, modal CRUD, upload foto, import Excel |\n| **Kelas** | Tabel, modal CRUD (nama, tingkat, jurusan) |\n| **Kategori** | Tabel, modal CRUD (nama, deskripsi) |\n| **Orang Tua** | Tabel, modal CRUD, toggle notifikasi |\n| **Users** | Tabel, modal CRUD, pilih role, import Excel |\n| **Perangkat** | Tabel, modal CRUD (kode, nama, lokasi, tipe, delay) |\n| **Lokasi** | Tabel, modal CRUD |\n\n### 14.4 Halaman Sistem\n\n| Halaman | Elemen Utama |\n|---------|-------------|\n| **Notifikasi** | Tabel log WA (phone, status, timestamp), statistik |\n| **Settings** | Form: nama institusi, logo, API token, nomor kepsek |\n| **Profile** | Form: nama, foto, ganti password |\n\n---\n\n## 15. RENCANA PENGUJIAN\n\n### 15.1 Pengujian Fungsional (Black Box)\n\n| No | Skenario | Input | Output yang Diharapkan |\n|----|----------|-------|----------------------|\n| 1 | Login valid | Email + password benar | Redirect ke dashboard |\n| 2 | Login invalid | Password salah | Error "Email atau password salah" |\n| 3 | Tap kartu terdaftar | UID valid | LCD: SELAMAT DATANG + nama |\n| 4 | Tap kartu tidak terdaftar | UID invalid | LCD: KARTU TIDAK TERDAFTAR |\n| 5 | Tap terlalu cepat | Interval < 300s | LCD: TUNGGU DULU |\n| 6 | Tap API key salah | API key invalid | Response 401 |\n| 7 | WA saat tap siswa | Tap IN siswa | Ortu terima WA |\n| 8 | Tambah siswa | Data + RFID unik | Siswa tersimpan |\n| 9 | RFID duplikat | UID sudah ada | Error: sudah terdaftar |\n| 10 | Import Excel | File .xlsx template | Data masuk DB |\n| 11 | Export rekap | Filter tanggal | File .xlsx download |\n| 12 | Cari siswa landing | Nama siswa | Hasil pencarian muncul |\n\n### 15.2 Pengujian Non-Fungsional\n\n| No | Aspek | Kriteria Sukses |\n|----|-------|----------------|\n| 1 | Performa tap | < 3 detik dari tap hingga LCD |\n| 2 | Load dashboard | < 2 detik |\n| 3 | Akses tanpa token | Response 401 |\n| 4 | Responsif mobile | Layout menyesuaikan 360px |\n| 5 | WiFi terputus | ESP32 reconnect otomatis |\n| 6 | Fonnte gagal | Tap tetap tersimpan, log: failed |\n\n### 15.3 Pengujian Hardware\n\n| No | Komponen | Kriteria Sukses |\n|----|----------|----------------|\n| 1 | MFRC522 | UID terbaca < 1 detik |\n| 2 | ESP32 WiFi | Terhubung < 10 detik |\n| 3 | LCD I2C | Teks tampil jelas |\n| 4 | Buzzer | Beep terdengar saat tap |\n| 5 | Integrasi penuh | Tap → Server → WA < 5 detik |\n\n---\n\n## 16. KEAMANAN & DEPLOYMENT\n\n### 16.1 Keamanan\n\n| Aspek | Implementasi |\n|-------|-------------|\n| Autentikasi | Laravel Sanctum (Bearer Token) |\n| Otorisasi | Role-based (5 level) |\n| API Key ESP32 | Validasi pada setiap request tap |\n| Password | Bcrypt hashing |\n| CORS | Domain whitelist |\n| Input Validation | Laravel validation di semua endpoint |\n| SQL Injection | Eloquent ORM (parameterized queries) |\n| Anti-Spam | Tap delay per siswa/guru |\n\n### 16.2 Deployment\n\n| Komponen | Lokasi |\n|----------|--------|\n| Frontend (React build) | \`public_html/\` di shared hosting |\n| Backend (Laravel) | \`public_html/api/\` |\n| Database | MySQL di shared hosting |\n| Domain | absenulilalbab.com |\n| Email | SMTP via mail.absenulilalbab.com |\n| ESP32 | Fisik di gerbang sekolah |\n\n---\n\n## 17. MATRIKS TRACEABILITY\n\n| Kebutuhan | Use Case | Backend | Frontend | Tabel DB |\n|-----------|----------|---------|----------|----------|\n| FR-01 Auth | UC-05 | AuthController | Login.jsx | users |\n| FR-02 Tap | UC-01,07 | TapController, TapService | Landing.jsx | attendance_logs |\n| FR-03 Notif | UC-04 | FonnteService | Notifications.jsx | notification_logs |\n| FR-04 Dashboard | UC-06 | DashboardService | Dashboard.jsx | attendance_logs |\n| FR-05.1 Siswa | UC-09 | StudentController | Students.jsx | students |\n| FR-05.2 Guru | UC-10 | TeacherController | Teachers.jsx | teachers |\n| FR-05.3 Kelas | UC-11 | ClassController | Classes.jsx | classes |\n| FR-05.5 Ortu | UC-12 | ParentController | Parents.jsx | parents |\n| FR-05.7 Device | UC-13 | EspDeviceController | Devices.jsx | esp_devices |\n| FR-06 Rekap | UC-14 | ReportController | Recap.jsx | attendance_logs |\n| FR-07 Landing | UC-02,03 | PublicController | Landing.jsx | students |\n| FR-08 Setting | UC-16 | SettingController | Settings.jsx | app_settings |\n\n---\n\n## 18. GLOSARIUM\n\n| Istilah | Definisi |\n|---------|----------|\n| RFID | Radio Frequency Identification — identifikasi nirkabel via gelombang radio |\n| UID | Unique Identifier — kode unik pada setiap kartu RFID |\n| ESP32 | Mikrokontroler dengan WiFi/BLE built-in buatan Espressif |\n| MFRC522 | Modul pembaca kartu RFID frekuensi 13.56 MHz |\n| Fonnte | Layanan API pihak ketiga untuk mengirim pesan WhatsApp |\n| Sanctum | Library autentikasi token API dari Laravel |\n| CRUD | Create, Read, Update, Delete |\n| Boarding | Siswa asrama yang tinggal di lingkungan sekolah |\n| Tap Delay | Jeda waktu minimum antar tap untuk mencegah duplikasi |\n| REST API | Arsitektur komunikasi server berbasis HTTP methods |\n\n---\n\n## 19. KESIMPULAN\n\nSistem Absensi RFID SMAIT Ulil Albab adalah sistem IoT terintegrasi yang menghubungkan perangkat keras (ESP32 + MFRC522) dengan aplikasi web modern (Laravel + React). Sistem ini memiliki **13 entitas database**, **50+ endpoint API**, **17 halaman frontend**, dan **5 level role pengguna**. Fitur unggulan meliputi notifikasi WhatsApp otomatis, live monitoring, multi-device support, dan export laporan Excel.\n\n---\n\n*Dokumen ini disusun berdasarkan analisis kode sumber sistem yang berjalan di repository ABSENRFID.*\n\n`;

async function render(){
  const el=document.getElementById('content');
  // First pass: convert markdown to HTML
  let html=marked.parse(md);
  el.innerHTML=html;
  // Find all mermaid code blocks and convert them
  const pres=el.querySelectorAll('pre code.language-mermaid');
  for(let i=0;i<pres.length;i++){
    const pre=pres[i].closest('pre');
    const div=document.createElement('div');
    div.className='mermaid';
    try{
      const {svg}=await mermaid.render('mermaid-'+i,pres[i].textContent);
      div.innerHTML=svg;
    }catch(e){
      div.innerHTML='<pre style="color:red">Diagram error: '+e.message+'</pre>';
    }
    pre.replaceWith(div);
  }
}
